services:
  allowance:
    image: ghcr.io/gurase/aballowance:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./kids.json:/app/kids.json
      - actual_data:/app/actual-data
    environment:
      ACTUAL_SERVER_URL: http://your-actual-server:5006
      ACTUAL_PASSWORD: ""
      ACTUAL_BUDGET_ID: your-budget-sync-id-here
      ACTUAL_FILE_PASSWORD: ""
      PORT: "3000"

volumes:
  actual_data:
